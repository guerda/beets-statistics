<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Album - Beets Statistics</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/static/main.css" />
  </head>
  <body>
    {% include 'navigation.html' %}
    <content>
      <h2>Album</h2>
        <table>
          <tr>
            <td>Album Artist:</td>
            <td><a href="https://musicbrainz.org/artist/{{album.mb_albumartistid}}">{{ album.albumartist }}</a></td>
          </tr>
          <tr>
            <td>Artist:</td>
            <td>{{ album.artist }}</td>
          </tr>
          <tr>
            <td>Title:</td>
            <td>{{ album.album }}</td>
          </tr>
          <tr>
            <td>ID:</td>
            <td>{{ album.id }}</td>
          </tr>
          <tr>
            <td>MusicBrainz ID:</td>
            <td><a href="https://musicbrainz.org/release/{{ album.mb_albumid }}">On MusicBrainz</a></td>
          </tr>
          <tr>
            <td>Year:</td>
            <td>{{album.year }}</td>
          </tr>
          <tr>
            <td>Genre:</td>
            <td>{{ album.genre }}</td>
          </tr>
          <tr>
            <td>Barcode:</td>
            <td>{{ album.barcode }}</td>
          </tr>
          </table>
    </content>
    {% include 'footer.html' %}
    
  </body>
</html>
